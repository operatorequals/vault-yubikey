# Certificate Signing Request (CSR) Configuration
# These fields define the subject and extensions for the certificate
csr:
  # Subject fields
  common_name: "john.torakis@example.com" # Common name (CN) - typically a hostname
  organization: "My Organization Inc." # Organization name (O)
  organizational_unit: "Engineering" # Organizational unit (OU)
  country: "US" # Country code (C) - 2 letter ISO code
  locality: "San Francisco" # City/Locality (L)
  province: "California" # State/Province (ST)
  street_address: "123 Main Street" # Street address (optional)
  postal_code: "94105" # Postal/ZIP code (optional)

  # Certificate extensions
  email_addresses: # Email SAN entries
    - "john.torakis@example.com"
  ip_addresses: # IP address SAN entries
    - "192.168.1.1"
    - "10.0.0.1"

  extra:
    createdBy: vault-yubikey

# Yubikey Configuration
yubikey:
  # Algorithm for key generation
  # Options: rsa1024, rsa2048, rsa3072, rsa4096, ec256, ec384, ed25519
  # Default: rsa2048
  algorithm: "rsa2048"

  # Yubikey slot to use for key storage
  # Options: 9a (authentication), 9c (signature), 9d (key management), 9e (card authentication)
  # Default: 9a
  slot: "9a"

  # Touch policy for Yubikey operations
  # Options: always, never, cached
  # Default: always
  touch_policy: "always"

# Vault Configuration
vault:
  vault_address: "https://localhost:8200"
  skip_verify: true
  # ca_file: "/etc/ssl/certs/vault-ca.pem"

  pki_mount: "pki"
  pki_role: "yubikey"

  cert_auth_mount: "cert"
  cert_auth_role: ""
